<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLOG — 株式会社リングクラス</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background-color: #1e2022;
      color: #cbc7c0;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }
    .logo-text {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: .2em;
      color: rgba(210,206,199,.5);
      margin-bottom: 60px;
    }
    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: #d4aa1a;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: rgba(255,255,255,.12);
      line-height: 1;
      margin-bottom: 24px;
    }
    .msg {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 400;
      color: rgba(210,206,199,.6);
      letter-spacing: .08em;
      margin-bottom: 48px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #cbc7c0;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.2);
      padding: 14px 32px;
      transition: border-color .25s, color .25s;
    }
    .back-link:hover { border-color: rgba(255,255,255,.5); color: #fff; }
  </style>
</head>
<body>
  <p class="logo-text">RING CLASS Co., Ltd.</p>
  <p class="label">Blog</p>
  <h1>COMING<br>SOON</h1>
  <p class="msg">ブログは準備中です。しばらくお待ちください。</p>
  <a href="index.html" class="back-link">← トップページへ戻る</a>
</body>
</html>

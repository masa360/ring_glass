<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En's Festa 過去実績 — 株式会社リングクラス</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:wght@300;400;500;600&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background-color: #f7f8fa;
      color: #1a3a4f;
      font-family: 'Noto Sans JP', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
    }
    .logo-text {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: rgba(0,80,120,.5);
      margin-bottom: 56px;
    }
    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: #0088aa;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .label::before {
      content: '';
      width: 20px; height: 2px;
      background: #0088aa;
    }
    h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 600;
      letter-spacing: .06em;
      color: rgba(0,80,130,.12);
      line-height: 1.1;
      margin-bottom: 28px;
    }
    .msg {
      font-family: 'Shippori Mincho', serif;
      font-size: clamp(17px, 2vw, 20px);
      font-weight: 500;
      color: #0a2e4a;
      letter-spacing: .08em;
      line-height: 1.9;
      margin-bottom: 10px;
    }
    .sub {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: rgba(0,60,100,.6);
      letter-spacing: .06em;
      margin-bottom: 52px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #0a2e4a;
      text-decoration: none;
      border: 1px solid rgba(0,120,170,.45);
      padding: 14px 36px;
      border-radius: 3px;
      transition: border-color .25s, color .25s, background .25s;
    }
    .back-link:hover {
      border-color: #0088aa;
      color: #0088aa;
      background: rgba(0,136,170,.04);
    }
  </style>
</head>
<body>
  <p class="logo-text">RING CLASS Co., Ltd.</p>
  <p class="label">En&rsquo;s Festa</p>
  <h1>COMING<br>SOON</h1>
  <p class="msg">過去実績を準備中です。</p>
  <p class="sub">note・Instagram にて随時公開しています。</p>
  <a href="index.html" class="back-link">← トップへ戻る</a>
</body>
</html>
